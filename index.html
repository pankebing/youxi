function updChickens(dt){const gcx=GARDEN.x+GARDEN.w/2,gcy=GARDEN.y+GARDEN.h/2,elapsed=G.DUR-timeLeft,spdMul=1+elapsed*.003;const trees=[{x:55,y:200},{x:35,y:350},{x:745,y:200},{x:760,y:380},{x:690,y:140}];chickens.forEach(ch=>{if(ch.dead)return;if(ch.jumpA>0)ch.jumpA=Math.max(0,ch.jumpA-dt*4);if(ch.flash>0)ch.flash=Math.max(0,ch.flash-dt*3);if(ch.faceT>0)ch.faceT=Math.max(0,ch.faceT-dt);if(ch.celebJump>0)ch.celebJump=Math.max(0,ch.celebJump-dt);if(ch.stunTimer>0){ch.stunTimer=Math.max(0,ch.stunTimer-dt);return;}if(Math.abs(ch.knockX)>.5||Math.abs(ch.knockY)>.5){ch.x+=ch.knockX*dt*8;ch.y+=ch.knockY*dt*8;ch.knockX*=.9;ch.knockY*=.9;}if(performance.now()-ch.born>ch.cvTime*1000){transformCh(ch);return;}if(ch.inTree){ch.treeT+=dt*1000;if(ch.treeT>=G.TREE_STAY){ch.inTree=false;ch.treeT=0;}return;}if(ch.isJumping){ch.jumpTimer-=dt;const p=cl(1-ch.jumpTimer/ch.jumpDur,0,1),e=1-(1-p)*(1-p);ch.x=lerp(ch.jumpSX,ch.jumpTX,e);ch.y=lerp(ch.jumpSY,ch.jumpTY,e);if(ch.jumpTimer<=0){ch.x=ch.jumpTX;ch.y=ch.jumpTY;ch.isJumping=false;}return;}if(ch.chickenState==='hiding'){ch.hideTimer-=dt;const dx=ch.hideTarget.x-ch.x,dy=ch.hideTarget.y-ch.y,d=Math.sqrt(dx*dx+dy*dy)||1;if(d>5){ch.x+=dx/d*G.C_SPD*1.5*ch.spdMul*dt;ch.y+=dy/d*G.C_SPD*1.5*ch.spdMul*dt;}ch.x=cl(ch.x,10,W-10);ch.y=cl(ch.y,70,H-10);if(ch.hideTimer<=0)ch.chickenState='walking';return;}if(ch.type==='hen'){const dx=girl.x-ch.x,dy=girl.y-ch.y,d=Math.sqrt(dx*dx+dy*dy)||1;if(d>30){ch.x+=dx/d*96*dt;ch.y+=dy/d*96*dt;}else{ch.peckT+=dt*1000;if(ch.peckT>=2000){ch.peckT=0;girlAngerPoints++;if(girlAngerPoints>=5&&!rageMode){rageMode=true;rageAccum=0;S.rageT();girl.dialogT=2;girl.dialogText=T_GIRL_RAGE;}aFloat('💢+1',girl.x,girl.y-40,'#FF0000',14);}}ch.x=cl(ch.x,10,W-10);ch.y=cl(ch.y,70,H-10);return;}const spd=G.C_SPD*spdMul*ch.spdMul;if(ch.type==='duck'&&ch.quackT!==undefined){ch.quackT-=dt;if(ch.quackT<=0){ch.quackT=R(4,8);S.quack();}}if(!ch.isPeck){for(const t of trees){if(di(ch.x,ch.y,t.x,t.y+10)<35&&ch.type!=='duck'){if(Math.random() function transformCh(ch){S.tr();aFloat(pick(T_T),ch.x,ch.y-40,'#FF9800',16);efx.push({tp:'ring',x:ch.x,y:ch.y,c:'#FF9800',life:.5,ml:.5,mR:40});const lv=LEVELS[level];for(let i=0;i<3;i++){if(lv&&lv.ducks)flies.push(mkMosq(ch.x+R(-15,15),ch.y+R(-15,15)));else flies.push(mkFly(ch.x+R(-15,15),ch.y+R(-15,15)));}ch.dead=true;}
function updFlies(dt){const gcx=GARDEN.x+GARDEN.w/2,gcy=GARDEN.y+GARDEN.h/2;flies.forEach(f=>{if(f.dead)return;f.t+=dt;if(f.diveT>0)f.diveT=Math.max(0,f.diveT-dt);if(f.type==='mosquito'){f.x+=Math.sin(f.t*4)*G.F_SPD*1.2*dt+f.vx*dt*.3;f.y+=Math.cos(f.t*3)*G.F_SPD*.8*dt+f.vy*dt*.3;if(f.buzzT!==undefined){f.buzzT-=dt;if(f.buzzT<=0){f.buzzT=R(2,5);S.buzz();}}}else{f.x+=Math.sin(f.t*3)*G.F_SPD*dt+f.vx*dt*.3;f.y+=Math.cos(f.t*2.5)*G.F_SPD*.6*dt+f.vy*dt*.3;}if(f.x<30||f.x>W-30){f.vx*=-1;f.x=cl(f.x,30,W-30);}if(f.y<80||f.y>H-30){f.vy*=-1;f.y=cl(f.y,80,H-30);}if(Math.random()<.008){const dx=gcx-f.x,dy=gcy-f.y,d=Math.hypot(dx,dy)||1;f.vx=dx/d*G.F_SPD*.5;f.vy=dy/d*G.F_SPD*.5;}if(di(f.x,f.y,gcx,gcy)<55){if(!f._pc||f._pc<=0){f.diveT=.3;hp=Math.max(0,hp-G.PECK_DMG);S.gd();aFloat('-1',f.x,f.y-15,'#FF4444',12);setGirlAngry();f._pc=3;if(hp<=0)endGame(false);}}if(f._pc>0)f._pc-=dt;});flies=flies.filter(f=>!f.dead);}
function updLocusts(dt){locusts.forEach(lc=>{if(lc.dead)return;const gcx=GARDEN.x+GARDEN.w/2,gcy=GARDEN.y+GARDEN.h/2;const dx=gcx-lc.x,dy=gcy-lc.y,d=Math.sqrt(dx*dx+dy*dy)||1;lc.x+=(dx/d*80+lc.vx)*dt;lc.y+=(dy/d*80+lc.vy)*dt;lc.vx*=.98;lc.vy*=.98;if(d<30){lc.dead=true;hp=Math.max(0,hp-1);S.gd();aFloat('-1',lc.x,lc.y,'#FF4444',12);setGirlAngry();if(hp<=0)endGame(false);}});locusts=locusts.filter(l=>!l.dead);}
function updFrogs(dt){frogs.forEach(fr=>{if(fr.dead)return;if(fr.jumpT>0){fr.jumpT-=dt;if(fr.jumpT<=0){fr.jumpT=0;fr.sx=fr.tx;fr.sy=fr.ty;fr.x=fr.tx;fr.y=fr.ty;if(!fr.returning&&fr.target&&!fr.target.dead&&di(fr.x,fr.y,fr.target.x,fr.target.y)<40){fr.tongueT=.2;fr.tongueLen=0;}else if(fr.noTarget){fr.bounceN++;if(fr.bounceN>=fr.bounceMax){fr.dead=true;aFloat('呱~',fr.x,fr.y-20,'#4CAF50',12);S.frogV();}else{fr.jumpT=.3;fr.sx=fr.x;fr.sy=fr.y;fr.tx=fr.x+R(-10,10);fr.ty=fr.y;}}return;}if(fr.waitT>0){fr.waitT-=dt;return;}if(fr.tongueT>0){fr.tongueT-=dt;fr.tongueLen=cl(1-fr.tongueT/.2,0,1);if(fr.tongueT<=0){if(fr.target&&!fr.target.dead){fr.target.dead=true;fr.eaten++;burst(fr.target.x,fr.target.y,'#4CAF50',5);aFloat(pick(T_FROG),fr.target.x,fr.target.y-15,'#4CAF50',14);addScore(G.PTS_F);}if(fr.eaten>=fr.maxEat||fr.curTarget>=fr.targets.length-1){fr.dead=true;aFloat('呱~',fr.x,fr.y-20,'#4CAF50',12);S.frogV();}else{fr.curTarget++;let nt=fr.targets[fr.curTarget];while(nt&&nt.dead&&fr.curTarget<fr.targets.length-1){fr.curTarget++;nt=fr.targets[fr.curTarget];}if(nt&&!nt.dead){fr.target=nt;fr.tx=nt.x;fr.ty=nt.y;fr.sx=fr.x;fr.sy=fr.y;fr.jumpT=fr.jumpDur;}else{fr.dead=true;S.frogV();}}}return;}if(fr.returning){fr.dead=true;return;}if(fr.target&&!fr.target.dead){fr.tx=fr.target.x;fr.ty=fr.target.y;fr.sx=fr.x;fr.sy=fr.y;fr.jumpT=fr.jumpDur;}else if(fr.noTarget){fr.bounceN=0;fr.bounceMax=Math.floor(R(2,4));fr.jumpT=.3;fr.sx=fr.x;fr.sy=fr.y;fr.tx=fr.x+R(-10,10);fr.ty=fr.y;}else{fr.curTarget++;if(fr.curTarget<fr.targets.length){fr.target=fr.targets[fr.curTarget];if(fr.target&&!fr.target.dead){fr.tx=fr.target.x;fr.ty=fr.target.y;fr.sx=fr.x;fr.sy=fr.y;fr.jumpT=fr.jumpDur;}else fr.returning=true;}else fr.returning=true;}}});frogs=frogs.filter(f=>!f.dead);}

function update(dt){frT+=dt;stTmr+=dt;if(shkT>0)shkT-=dt;if(scPop>0)scPop=Math.max(0,scPop-dt*3);if(throwAnimT>0)throwAnimT=Math.max(0,throwAnimT-dt);if(orangeCD>0)orangeCD=Math.max(0,orangeCD-dt);if(zapCD>0)zapCD=Math.max(0,zapCD-dt);if(eagleCD>0)eagleCD=Math.max(0,eagleCD-dt);if(scarfCD>0)scarfCD=Math.max(0,scarfCD-dt);if(henOrangeCD>0)henOrangeCD=Math.max(0,henOrangeCD-dt);if(scarfWinT>0)scarfWinT=Math.max(0,scarfWinT-dt);if(girlRageCD>0)girlRageCD=Math.max(0,girlRageCD-dt);switch(state){case ST.TITLE:break;case ST.COUNT:if(stTmr>=1){stTmr=0;cntN--;S.tk();if(cntN<0)startPlay();}break;case ST.PLAY:timeLeft-=dt;if(timeLeft<=0){timeLeft=0;endGame(false);return;}updLevelSpawn(dt);updChickens(dt);updFlies(dt);updLocusts(dt);updFrogs(dt);updGirl(dt);updParts(dt);updOP(dt);updHenOP(dt);updEagles(dt);updShockwaves(dt);updMH(dt);updBD(dt);updTn(dt);if(frogCD>0)frogCD=Math.max(0,frogCD-dt);if(checkLC())levelClear();break;case ST.OVER:updRain(dt);updParts(dt);rainSndTmr+=dt;if(rainSndTmr>2){rainSndTmr=0;rainSnd();}break;case ST.WIN:updConf(dt);updParts(dt);break;case ST.LVLUP:updConf(dt);updParts(dt);if(stTmr>=2)nextLevel();break;}}
